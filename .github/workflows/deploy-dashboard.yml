name: Build Dashboard Image → ECR

on:
  push:
    branches: [main]
    paths:
      - 'shared/nextjs-app/**'
      - 'docker/dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'ECR image tag (default: git SHA + latest)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  build-and-push:
    name: Build → Push to ECR
    runs-on: cc-bedrock-arm

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          docker build --platform linux/arm64 \
            -t "$ECR_REGISTRY/cc-on-bedrock/dashboard:${{ github.sha }}" \
            -f docker/dashboard/Dockerfile .
          docker push "$ECR_REGISTRY/cc-on-bedrock/dashboard:${{ github.sha }}"
          docker tag "$ECR_REGISTRY/cc-on-bedrock/dashboard:${{ github.sha }}" \
            "$ECR_REGISTRY/cc-on-bedrock/dashboard:latest"
          docker push "$ECR_REGISTRY/cc-on-bedrock/dashboard:latest"
