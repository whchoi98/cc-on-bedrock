name: PR Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ap-northeast-2

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA"..."$HEAD_SHA" > /tmp/pr-diff.txt
          LINES=$(wc -l < /tmp/pr-diff.txt)
          echo "Total diff: $LINES lines"
          if [ "$LINES" -gt 5000 ]; then
            head -5000 /tmp/pr-diff.txt > /tmp/pr-diff-review.txt
            echo "TRUNCATED=true" >> "$GITHUB_ENV"
          else
            cp /tmp/pr-diff.txt /tmp/pr-diff-review.txt
            echo "TRUNCATED=false" >> "$GITHUB_ENV"
          fi

      - name: Review with Claude Code
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        run: |
          cat /tmp/pr-diff-review.txt | claude -p "You are an expert code reviewer for a CDK + Next.js + ECS project (TypeScript, Python).

          Review the PR diff provided via stdin. Focus on:
          1. Bugs and logic errors
          2. Security vulnerabilities (injection, credential exposure, IAM over-privilege)
          3. Performance issues (N+1 queries, memory leaks, unnecessary re-renders)
          4. AWS best practices (IAM least privilege, resource limits, error handling)

          Rules:
          - Only flag real, actionable issues — not style preferences
          - Reference specific files and line numbers
          - Be concise: 1-2 sentences per finding
          - If no issues found, say 'No critical issues found' with a brief summary
          - Use Korean for explanations, English for code references
          - Output in markdown format" > /tmp/review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "## Claude Code Review"
            echo ""
            cat /tmp/review.md
            if [ "$TRUNCATED" = "true" ]; then
              echo ""
              echo "> Note: Diff was truncated to 5000 lines for review."
            fi
            echo ""
            echo "---"
            echo "*Automated review by Claude Code on Bedrock*"
          } > /tmp/comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md
