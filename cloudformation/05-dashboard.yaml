AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CC-on-Bedrock Dashboard Stack - EC2 ASG, ALB, CloudFront, Route 53.
  Equivalent to cdk/lib/05-dashboard-stack.ts and terraform/modules/dashboard.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  VpcCidr:
    Type: String
  PublicSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PublicSubnetCId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetCId:
    Type: AWS::EC2::Subnet::Id
  KmsKeyArn:
    Type: String
  DashboardEc2InstanceProfileName:
    Type: String
  DashboardCertificateArn:
    Type: String
  HostedZoneId:
    Type: String
  DomainName:
    Type: String
  CloudFrontSecretArn:
    Type: String
  UserPoolId:
    Type: String
  UserPoolClientId:
    Type: String
  LitellmAlbDns:
    Type: String
  InstanceType:
    Type: String
    Default: t4g.xlarge
  CloudFrontPrefixListId:
    Type: String
    Default: pl-22a6434b
    Description: CloudFront managed prefix list ID for the region

Resources:
  # ---------- Security Groups --------------------------------------------------
  DashboardAlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Dashboard ALB SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourcePrefixListId: !Ref CloudFrontPrefixListId
          Description: Allow CloudFront
      Tags:
        - Key: Name
          Value: cc-dashboard-alb-sg

  DashboardEc2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Dashboard EC2 SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref DashboardAlbSg
          Description: Allow from ALB
      Tags:
        - Key: Name
          Value: cc-dashboard-ec2-sg

  # ---------- ALB --------------------------------------------------------------
  DashboardAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cc-dashboard-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref DashboardAlbSg
      Subnets:
        - !Ref PublicSubnetAId
        - !Ref PublicSubnetCId
      Tags:
        - Key: Name
          Value: cc-dashboard-alb

  DashboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: cc-dashboard-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      Tags:
        - Key: Name
          Value: cc-dashboard-tg

  DashboardHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref DashboardAlb
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref DashboardCertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref DashboardTargetGroup

  # ---------- Launch Template + ASG --------------------------------------------
  DashboardLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: cc-dashboard-lt
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref DashboardEc2InstanceProfileName
        SecurityGroupIds:
          - !Ref DashboardEc2Sg
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              Encrypted: true
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -euo pipefail

            # Install Node.js 20
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            yum install -y nodejs

            # Install PM2
            npm install -g pm2

            # TODO: Deploy Next.js app from S3/CodeDeploy
            # For now, create placeholder
            mkdir -p /opt/dashboard
            cd /opt/dashboard

            cat > server.js << 'INNEREOF'
            const http = require('http');
            const server = http.createServer((req, res) => {
              if (req.url === '/api/health') {
                res.writeHead(200, { 'Content-Type': 'application/json' });
                res.end(JSON.stringify({ status: 'ok' }));
              } else {
                res.writeHead(200, { 'Content-Type': 'text/html' });
                res.end('<h1>CC-on-Bedrock Dashboard</h1><p>Next.js app will be deployed here.</p>');
              }
            });
            server.listen(3000, () => console.log('Dashboard running on port 3000'));
            INNEREOF

            pm2 start server.js --name dashboard
            pm2 startup
            pm2 save
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: cc-dashboard

  DashboardAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: cc-dashboard-asg
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      VPCZoneIdentifier:
        - !Ref PrivateSubnetAId
        - !Ref PrivateSubnetCId
      HealthCheckType: ELB
      TargetGroupARNs:
        - !Ref DashboardTargetGroup
      LaunchTemplate:
        LaunchTemplateId: !Ref DashboardLaunchTemplate
        Version: !GetAtt DashboardLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: cc-dashboard
          PropagateAtLaunch: true

  # ---------- CloudFront Distribution ------------------------------------------
  DashboardCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: CC-on-Bedrock Dashboard
        Enabled: true
        Origins:
          - Id: dashboard-alb
            DomainName: !GetAtt DashboardAlb.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Custom-Secret
                HeaderValue: !Sub '{{resolve:secretsmanager:${CloudFrontSecretArn}:SecretString}}'
        DefaultCacheBehavior:
          TargetOriginId: dashboard-alb
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - DELETE
            - GET
            - HEAD
            - OPTIONS
            - PATCH
            - POST
            - PUT
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none
      Tags:
        - Key: Name
          Value: cc-dashboard-cloudfront

  # ---------- Route 53 Record --------------------------------------------------
  DashboardDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'dashboard.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardCloudFront.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  DashboardUrl:
    Description: Dashboard URL
    Value: !Sub 'https://dashboard.${DomainName}'
    Export:
      Name: cc-on-bedrock-dashboard-url

  DashboardCloudFrontDomain:
    Description: Dashboard CloudFront domain name
    Value: !GetAtt DashboardCloudFront.DomainName
    Export:
      Name: cc-on-bedrock-dashboard-cf-domain

  DashboardAlbDns:
    Description: Dashboard ALB DNS name
    Value: !GetAtt DashboardAlb.DNSName
    Export:
      Name: cc-on-bedrock-dashboard-alb-dns
