<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Background Container -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Outer Glowing Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#3b82f6" stroke-width="12" opacity="0.15" filter="url(#glow)" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.3" />
  
  <!-- Stylized CC Text -->
  <text 
    x="256" 
    y="330" 
    text-anchor="middle" 
    fill="url(#text-grad)" 
    style="font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 240px; letter-spacing: -12px; filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.4));"
  >CC</text>
  
  <!-- Decorative Dot (Online/Live indicator style) -->
  <circle cx="420" cy="420" r="32" fill="#10b981" filter="url(#glow)" />
</svg>
